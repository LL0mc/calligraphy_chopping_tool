<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>集字排版</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  background: #2a2520; color: #d4c9b0;
  height: 100vh; display: flex; flex-direction: column;
  user-select: none;
}
/* Tab bar */
#tabBar {
  display: flex; background: #2a2520; border-bottom: 1px solid #4a4032;
  padding: 0 12px; flex-shrink: 0;
}
.tab {
  padding: 8px 20px; font-size: 13px; color: #908070; cursor: pointer;
  border-bottom: 2px solid transparent; text-decoration: none;
}
.tab:hover { color: #d4c9b0; }
.tab.active { color: #e8d8c0; border-bottom-color: #c09860; }

#toolbar {
  background: #3a3228; padding: 10px 20px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid #4a4032; flex-shrink: 0; flex-wrap: wrap;
}
#toolbar label { font-size: 13px; color: #b0a088; white-space: nowrap; }
#textInput {
  padding: 8px 12px; font-size: 15px; width: 360px; min-height: 36px;
  background: #4a4032; border: 1px solid #5a5042; color: #e8d8c0;
  border-radius: 4px; outline: none; resize: vertical; font-family: inherit; line-height: 1.5;
}
#textInput:focus { border-color: #c09860; }
select, input[type=number] {
  padding: 5px 8px; font-size: 13px;
  background: #4a4032; border: 1px solid #5a5042; color: #d4c9b0;
  border-radius: 4px; cursor: pointer; outline: none;
}
input[type=number] { width: 55px; }
.btn {
  padding: 6px 14px; font-size: 13px;
  background: #5a4a35; border: 1px solid #6a5a45; color: #d4c9b0;
  border-radius: 4px; cursor: pointer;
}
.btn:hover { background: #6a5a45; }
.btn.primary { background: #8a6a40; border-color: #c09860; }
.btn.primary:hover { background: #9a7a50; }
#main { display: flex; flex: 1; overflow: hidden; }
#sidebar {
  width: 260px; min-width: 260px; background: #322a20;
  border-right: 1px solid #4a4032; display: flex; flex-direction: column;
  overflow-y: auto;
}
#sidebar h3 { padding: 10px 14px; font-size: 13px; color: #a09880; border-bottom: 1px solid #4a4032; }
#charSelectList { flex: 1; padding: 6px; }
.char-sel-item {
  padding: 6px 10px; cursor: pointer; border-radius: 4px;
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px;
}
.char-sel-item:hover { background: #4a3a28; }
.char-sel-item .char-text { font-size: 18px; font-weight: bold; }
.char-sel-item .char-pos { font-size: 11px; color: #706050; }
.var-thumb {
  width: 36px; height: 44px; object-fit: contain; cursor: pointer;
  border: 2px solid transparent; border-radius: 2px; background: #4a3a28;
  margin: 1px;
}
.var-thumb:hover { border-color: #a08060; }
.var-thumb.active { border-color: #c09860; }
#previewArea {
  flex: 1; display: flex; align-items: flex-start; justify-content: flex-start;
  overflow: auto; padding: 20px; position: relative;
}
#previewWrap {
  position: relative; display: inline-block;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5); border-radius: 4px;
  line-height: 0; margin: 0 auto; min-width: 0;
}
#previewImg { display: block; max-width: none; }
#loading {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5); z-index: 999;
  align-items: center; justify-content: center; font-size: 18px;
}
#loading.show { display: flex; }

<body>

<div id="tabBar">
  <a href="/" class="tab">字库浏览</a>
  <a href="/compose" class="tab active">集字排版</a>
</div>

<div id="main">
  <div id="sidebar">
    <div id="inputSection" style="padding:10px 12px; border-bottom:1px solid #4a4032;flex-shrink:0;">
      <label style="font-size:12px; color:#b0a088; display:block; margin-bottom:6px;">✍ 输入文字</label>
      <textarea id="textInput" placeholder="Shift+Enter 生成，Enter 换行..." rows="3" style="width:100%; padding:8px 10px; font-size:14px; background:#4a4032; border:1px solid #5a5042; color:#e8d8c0; border-radius:4px; outline:none; resize:vertical; font-family:inherit; line-height:1.5; min-height:60px;">梦回红楼</textarea>
      <div style="margin-top:8px; display:flex; gap:6px;">
        <button class="btn primary" onclick="doSearch()" style="flex:1;">生成</button>
      </div>
    </div>
    <h3>选字列表 <span id="selectedCharName" style="font-weight:normal;font-size:12px;color:#c09860;"></span></h3>
    <div id="charSelectList"><div style="padding:20px;text-align:center;color:#706050;font-size:14px;">输入文字后生成</div></div>
    </div>
    <div id="previewArea">
      <div id="previewWrap">
        <img id="previewImg" style="display:none; cursor:crosshair;">
        <div id="noPreview" style="padding:40px;color:#908070;text-align:center;">
          输入文字，设置参数，点击「生成」
        </div>
      </div>
    </div>
  </div>
</div>

<div id="loading" class="show" style="display:none;">渲染中...</div>

<div id="paramsBar" style="
  background:#3a3228; padding:8px 20px; display:flex; align-items:center; gap:12px;
  border-top:1px solid #4a4032; flex-shrink:0; flex-wrap:wrap;
">
  <label>每列</label>
  <input type="number" id="colsInput" value="14" min="1" max="50">
  <label>方向</label>
  <select id="dirSelect">
    <option value="h_ltr">横排 LTR</option>
    <option value="h_rtl">横排 RTL</option>
    <option value="v_rtl" selected>竖排 RTL</option>
    <option value="v_ltr">竖排 LTR</option>
  </select>
  <label>字大小</label>
  <input type="number" id="charSizeInput" value="80" min="10" max="500">
  <label>间距</label>
  <input type="number" id="gapInput" value="8" min="0" max="100">
  <label>背景</label>
  <select id="bgSelect">
    <option value="beige" selected>米白色</option>
    <option value="white">白色</option>
    <option value="black">黑色</option>
    <option value="red">红色</option>
    <option value="grass">草木纸</option>
    <option value="gold_fleck">洒金宣</option>
  </select>
  <label>字色</label>
  <select id="colorSelect">
    <option value="black" selected>黑色</option>
    <option value="white">白色</option>
    <option value="ink_blue">墨蓝</option>
    <option value="gold">金色</option>
    <option value="red">红色</option>
  </select>
  <button class="btn primary" onclick="doRender()">渲染</button>
  <button class="btn" onclick="exportPNG()">导出 PNG</button>
  <button class="btn" onclick="exportPDF()">导出 PDF</button>
  <span style="flex:1"></span>
  <label style="font-size:11px;color:#908070;">缩放</label>
  <input type="range" id="zoomSlider" min="0.1" max="5" step="0.01" value="1.0"
    style="width:100px; accent-color:#c09860; cursor:pointer;">
  <span id="zoomInfo" style="font-size:12px;color:#908070;min-width:44px;text-align:center;">100%</span>
</div>

<script>
// ---- State ----
var charData = [];
var layoutCells = [];
var currentText = '';
var previewWidth = 0;
var previewHeight = 0;
var ZOOM_BASE = 0.40; // 100% slider = 40% of natural size (chars ~40px)
var lastRenderBlob = null; // stores latest rendered PNG blob for export

// ---- Zoom state ----
var zoomLevel = 1.0;
var totalCols = 0;

// ---- Punctuation set (client-side) ----
var PUNCTUATION = new Set('，。、；：？！,.;:?!');

// ---- Layout cell computation (matches server's segment-based layout) ----
function computeLayoutCells(text) {
  var params = getRenderParams();
  var cols = params.cols || 14;
  var cells = [];
  var segCol = 0, segRow = 0;
  var hasNewline = false;
  for (var ti = 0; ti < text.length; ti++) {
    if (text[ti] === '\n') { hasNewline = true; break; }
  }
  for (var ti = 0; ti < text.length; ti++) {
    var ch = text[ti];
    if (ch === '\n') {
      segCol++;
      segRow = 0;
    } else if (ch === ' ') {
      cells.push({ segCol: segCol, segRow: segRow, textIdx: ti, char: ch });
      segRow++;
    } else if (PUNCTUATION.has(ch)) {
      // Overlaid on previous cell in same column
    } else {
      if (!hasNewline && segRow >= cols) {
        segCol++;
        segRow = 0;
      }
      cells.push({ segCol: segCol, segRow: segRow, textIdx: ti, char: ch });
      segRow++;
    }
  }
  return cells;
}

function getCellPos(segCol, segRow, cellSize, gap, cols, direction, totalCols) {
  var leftMargin = gap * 2;
  if (direction.startsWith('v')) {
    var colIdx = direction.indexOf('rtl') >= 0 ? (totalCols - 1 - segCol) : segCol;
    var rowIdx = segRow;
    return {
      x: leftMargin + colIdx * (cellSize + gap),
      y: gap + rowIdx * (cellSize + gap),
      w: cellSize, h: cellSize
    };
  } else {
    // horizontal: segRow % cols = column index, segCol = row (y)
    var colIdx = segRow % cols;
    if (direction.indexOf('rtl') >= 0) colIdx = cols - 1 - colIdx;
    var rowIdx = segCol;
    return {
      x: leftMargin + colIdx * (cellSize + gap),
      y: gap + rowIdx * (cellSize + gap),
      w: cellSize, h: cellSize
    };
  }
}

// ---- Search ----
function doSearch() {
  var textarea = document.getElementById('textInput');
  currentText = textarea.value;  // Keep newlines
  if (!currentText.trim()) return;
  
  // Build search string without newlines
  var searchText = currentText.replace(/\n/g, '').trim();
  if (!searchText) return;

  document.getElementById('loading').style.display = 'flex';
  fetch('/api/compose/search?text=' + encodeURIComponent(searchText))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      charData = (data.chars || []).map(function(c) { return { char: c.char, variants: c.variants, selectedIdx: c.variants.length > 0 ? 0 : -1 }; });
      layoutCells = computeLayoutCells(currentText);
      renderCharList();
      document.getElementById('loading').style.display = 'none';
      doRender();
    })
    .catch(function() { document.getElementById('loading').style.display = 'none'; });
}

function renderCharList(selectedTextIdx) {
  var list = document.getElementById('charSelectList');
  if (!charData || charData.length === 0) { list.innerHTML = '<div style="padding:20px;text-align:center;color:#706050;">未找到</div>'; return; }
  var html = '';
  charData.forEach(function(cd, idx) {
    var ch = cd.char;
    var vcount = cd.variants.length;
    var selIdx = cd.selectedIdx;
    var textIdx = idx; // simplified: dataIdx matches text position
    var isHighlighted = (selectedTextIdx === idx);
    html += '<div class="char-sel-item' + (isHighlighted ? '" style="background:#5a4a35;"' : '"') + '>';
    html += '<div><span class="char-text">' + ch + '</span> <span class="char-pos">(' + vcount + '个)</span></div>';
    html += '<div>';
    if (vcount > 0) {
      var show = cd.variants.slice(0, Math.min(5, vcount));
      show.forEach(function(v, vi) {
        var isActive = (vi === selIdx) ? ' active' : '';
        html += '<img class="var-thumb' + isActive + '" src="/api/image/' + v.page_dir + '/' + encodeURIComponent(v.filename) + '?mode=binary&invert=0&size=60" title="第' + v.page + '页" onclick="event.stopPropagation(); selectVariant(' + idx + ',' + vi + ')">';
      });
    } else {
      html += '<span style="color:#706050;">无</span>';
    }
    html += '</div></div>';
  });
  list.innerHTML = html;
}

function selectVariant(charIdx, varIdx) {
  if (!charData[charIdx]) return;
  charData[charIdx].selectedIdx = varIdx;
  renderCharList();
  doRender();
}

// ---- Render ----
function doRender() {
  var text = currentText;
  if (!text || !text.trim()) return;
  layoutCells = computeLayoutCells(text);

  // Build chars array from text, matching to charData
  var chars = [];
  var variants = {};
  var dataIdx = 0;
  for (var ti = 0; ti < text.length; ti++) {
    var tc = text[ti];
    chars.push(tc);
    if (dataIdx < charData.length && charData[dataIdx].char === tc) {
      var cd = charData[dataIdx];
      if (cd.selectedIdx >= 0 && cd.selectedIdx < cd.variants.length) {
        var v = cd.variants[cd.selectedIdx];
        variants[ti] = { page_dir: v.page_dir, filename: v.filename };
      }
      dataIdx++;
    } else {
      for (var j = 0; j < charData.length; j++) {
        if (charData[j].char === tc) {
          var cd2 = charData[j];
          if (cd2.selectedIdx >= 0 && cd2.selectedIdx < cd2.variants.length) {
            var v2 = cd2.variants[cd2.selectedIdx];
            variants[ti] = { page_dir: v2.page_dir, filename: v2.filename };
          }
          break;
        }
      }
    }
  }

  var params = getRenderParams();

  document.getElementById('loading').style.display = 'flex';
  fetch('/api/compose/render', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chars: chars, variants: variants, params: params }),
  })
  .then(function(r) {
    if (!r.ok) { throw new Error('Render failed'); }
    // Capture actual cell size from header (server's auto-computed value)
    var actualCellSize = parseInt(r.headers.get('X-Cell-Size')) || 80;
    totalCols = parseInt(r.headers.get('X-Total-Cols')) || 0;
    return r.blob().then(function(blob) { return { blob: blob, cellSize: actualCellSize }; });
  })
  .then(function(result) {
    var blob = result.blob;
    lastRenderBlob = blob;
    var url = URL.createObjectURL(blob);
    var img = document.getElementById('previewImg');
    img.src = url;
    img.style.display = 'block';
    img.setAttribute('data-cell-size', result.cellSize);
    img.onload = function() {
      previewWidth = img.naturalWidth;
      previewHeight = img.naturalHeight;
      URL.revokeObjectURL(url);
      // Preserve user's zoom level
      applyZoom(zoomLevel);
    };
    document.getElementById('noPreview').style.display = 'none';
    document.getElementById('loading').style.display = 'none';

    // Apply background texture overlay (for patterned papers only)
    var wrap = document.getElementById('previewWrap');
    var bgVal = document.getElementById('bgSelect').value;
    wrap.className = '';
    if (bgVal === 'grass' || bgVal === 'gold_fleck') {
      wrap.classList.add('bg-' + bgVal);
    }
  })
  .catch(function(err) {
    document.getElementById('loading').style.display = 'none';
    alert('渲染失败: ' + err.message);
  });
}

function getRenderParams() {
  return {
    cols: parseInt(document.getElementById('colsInput').value) || 5,
    direction: document.getElementById('dirSelect').value,
    char_size: parseInt(document.getElementById('charSizeInput').value) || 80,
    gap: parseInt(document.getElementById('gapInput').value) || 8,
    text_color: document.getElementById('colorSelect').value,
    bg_color: document.getElementById('bgSelect').value,
  };
}

// ---- Export ----
function buildExportPayload() {
  var text = currentText;
  if (!text || !text.trim()) return null;
  var chars = [];
  var variants = {};
  var dataIdx = 0;
  for (var ti = 0; ti < text.length; ti++) {
    var tc = text[ti];
    chars.push(tc);
    if (tc === '\n') continue;
    if (dataIdx < charData.length && charData[dataIdx].char === tc) {
      var cd = charData[dataIdx];
      if (cd.selectedIdx >= 0 && cd.selectedIdx < cd.variants.length) {
        var v = cd.variants[cd.selectedIdx];
        variants[ti] = { page_dir: v.page_dir, filename: v.filename };
      }
      dataIdx++;
    } else {
      for (var j = 0; j < charData.length; j++) {
        if (charData[j].char === tc) {
          var cd2 = charData[j];
          if (cd2.selectedIdx >= 0 && cd2.selectedIdx < cd2.variants.length) {
            var v2 = cd2.variants[cd2.selectedIdx];
            variants[ti] = { page_dir: v2.page_dir, filename: v2.filename };
          }
          break;
        }
      }
    }
  }
  return { chars: chars, variants: variants, params: getRenderParams() };
}

function exportPNG() {
  if (!lastRenderBlob) { alert('请先渲染'); return; }
  var url = URL.createObjectURL(lastRenderBlob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'composition.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
}

function exportPDF() {
  var payload = buildExportPayload();
  if (!payload) { alert('请先输入文字'); return; }
  document.getElementById('loading').style.display = 'flex';
  fetch('/api/compose/export_pdf', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  })
  .then(function(r) {
    if (!r.ok) throw new Error('PDF export failed');
    return r.blob();
  })
  .then(function(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'composition.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
    document.getElementById('loading').style.display = 'none';
  })
  .catch(function(err) {
    document.getElementById('loading').style.display = 'none';
    alert('导出失败: ' + err.message);
  });
}

// ---- Zoom ----
function applyZoom(val) {
  zoomLevel = val;
  var img = document.getElementById('previewImg');
  if (previewWidth > 0) {
    img.style.width = (previewWidth * ZOOM_BASE * val) + 'px';
    img.style.height = 'auto';
  }
  document.getElementById('zoomInfo').textContent = Math.round(val * 100) + '%';
  // Center scroll when zoomed in
  var area = document.getElementById('previewArea');
  if (area.scrollWidth > area.clientWidth) {
    area.scrollLeft = (area.scrollWidth - area.clientWidth) / 2;
  } else {
    area.scrollLeft = 0;
  }
}

document.getElementById('zoomSlider').addEventListener('input', function() {
  applyZoom(parseFloat(this.value));
});

// ---- Click to select char in sidebar ----
document.getElementById('previewImg').addEventListener('click', function(e) {
  if (!previewWidth || !previewHeight) return;
  var text = currentText;
  if (!text) return;

  var img = document.getElementById('previewImg');
  var rect = img.getBoundingClientRect();
  var visualScale = img.offsetWidth / previewWidth;
  var clickX = (e.clientX - rect.left) / visualScale;
  var clickY = (e.clientY - rect.top) / visualScale;

  var params = getRenderParams();
  var gap = params.gap || 12;
  // Use actual cell size from server (or fallback to char_size)
  var cellSize = parseInt(document.getElementById('previewImg').getAttribute('data-cell-size')) || params.char_size || 80;

  // Find which layout cell was clicked
  for (var i = 0; i < layoutCells.length; i++) {
    var cell = layoutCells[i];
    if (cell.char === ' ') continue;
    var effectiveCols = totalCols > 0 ? totalCols : Math.max(1, Math.ceil(layoutCells.length / (params.cols || 14)) + 5);
    var pos = getCellPos(cell.segCol, cell.segRow, cellSize, gap, params.cols || 14, params.direction || 'v_rtl', effectiveCols);
    if (clickX >= pos.x && clickX < pos.x + pos.w &&
        clickY >= pos.y && clickY < pos.y + pos.h) {
      // Map textIdx (with newlines) → dataIdx (no newlines)
      var ti = cell.textIdx;
      var dataIdx = 0;
      for (var k = 0; k < ti; k++) {
        if (text[k] !== '\n') dataIdx++;
      }
      var items = document.querySelectorAll('.char-sel-item');
      if (items[dataIdx]) {
        items[dataIdx].scrollIntoView({ block: 'nearest' });
      }
      renderCharList(dataIdx);
      document.getElementById('selectedCharName').textContent = '→ ' + text[ti];
      break;
    }
  }
});

// ---- Textarea events ----
document.getElementById('textInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = (this.scrollHeight) + 'px';
});

// Shift+Enter = generate, Enter = newline
document.getElementById('textInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.shiftKey) {
    e.preventDefault();
    doSearch();
  }
});

// Auto-render on param change — use input for number fields (spinner arrows, typing)
['colsInput', 'charSizeInput', 'gapInput'].forEach(function(id) {
  var el = document.getElementById(id);
  var timer = null;
  el.addEventListener('input', function() {
    if (charData.length === 0) return;
    if (timer) clearTimeout(timer);
    timer = setTimeout(function() { timer = null; doRender(); }, 200);
  });
});
['dirSelect', 'bgSelect', 'colorSelect'].forEach(function(id) {
  document.getElementById(id).addEventListener('change', function() { if (charData.length > 0) doRender(); });
});

// Init with default text
document.getElementById('zoomSlider').value = zoomLevel;
document.getElementById('zoomInfo').textContent = '100%';
doSearch();
</script>
