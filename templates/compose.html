<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>集字排版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=ZCOOL+QingKe+HuangYou&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0e1420;
  --bg-surface: #141a28;
  --glass-bg: rgba(255,255,255,0.04);
  --glass-border: rgba(255,255,255,0.08);
  --glass-hover: rgba(255,255,255,0.12);
  --text-primary: #e8e0d4;
  --text-muted: #908078;
  --text-faint: #605850;
  --accent-red: #e8453c;
  --accent-red-glow: rgba(232,69,60,0.25);
  --accent-blue: #4a7cf7;
  --accent-blue-glow: rgba(74,124,247,0.2);
  --accent-gold: #c09860;
  --accent-green: #34d399;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --font-ui: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
  --font-display: 'ZCOOL QingKe HuangYou', 'KaiTi', serif;
  --font-mono: 'JetBrains Mono', 'Consolas', monospace;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}
body.light{
  --bg-deep: #f2e8c8;
  --bg-surface: #faf4e0;
  --glass-bg: rgba(255,252,240,0.8);
  --glass-border: rgba(0,0,0,0.07);
  --glass-hover: rgba(0,0,0,0.12);
  --text-primary: #2c2416;
  --text-muted: #6b6050;
  --text-faint: #9a9080;
  --accent-red: #d13b30;
  --accent-red-glow: rgba(209,59,48,0.2);
  --accent-blue: #3b6fe0;
  --accent-blue-glow: rgba(59,111,224,0.18);
  --input-bg: rgba(0,0,0,0.04);
  --input-border: rgba(0,0,0,0.12);
}
body.light select, body.light input[type=text], body.light input[type=number], body.light textarea {
  background: var(--input-bg);
  border: 1px solid var(--input-border);
}
body.light #paramsBar select, body.light #paramsBar input[type=number] {
  background: var(--input-bg);
  border: 1px solid var(--input-border);
}
body.light select:focus, body.light input[type=text]:focus, body.light input[type=number]:focus, body.light textarea:focus {
  border-color: var(--accent-blue);
  box-shadow: 0 0 8px var(--accent-blue-glow);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-ui);
  background: var(--bg-deep);
  color: var(--text-primary);
  height: 100vh; display: flex; flex-direction: column;
  user-select: none;
}
@keyframes fadeIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
#tabBar {
  display: flex; background: var(--bg-deep); border-bottom: 1px solid var(--glass-border);
  padding: 0 12px; flex-shrink: 0;
}
.tab {
  padding: 8px 20px; font-size: 13px; color: var(--text-faint); cursor: pointer;
  border-bottom: 2px solid transparent; text-decoration: none; transition: var(--transition);
}
.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--text-primary); border-bottom-color: var(--accent-gold); }

#main { display: flex; flex: 1; overflow: hidden; animation: fadeIn 0.5s ease 0.1s both; }
#sidebar {
  width: 260px; min-width: 260px; background: var(--glass-bg);
  border-right: 1px solid var(--glass-border); display: flex; flex-direction: column;
  overflow-y: auto; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
#sidebar h3 { padding: 10px 14px; font-size: 13px; color: var(--text-muted); border-bottom: 1px solid var(--glass-border); }
#charSelectList { flex: 1; padding: 6px; }
.char-sel-item {
  padding: 6px 10px; cursor: pointer; border-radius: var(--radius-sm);
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; transition: var(--transition);
}
.char-sel-item:hover { background: rgba(255,255,255,0.06); }
.char-sel-item > div:first-child { min-width: 60px; white-space: nowrap; flex-shrink: 0; }
.char-sel-item .char-text { font-size: 18px; font-weight: bold; }
.char-sel-item .char-pos { font-size: 11px; color: var(--text-faint); }
.var-thumb {
  width: 36px; height: 44px; object-fit: contain; cursor: pointer;
  border: 2px solid transparent; border-radius: 4px; background: var(--bg-surface);
  margin: 1px; transition: var(--transition);
}
.var-thumb:hover { border-color: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue-glow); }
.var-thumb.active { border-color: var(--accent-gold); }
#previewArea {
  flex: 1; display: flex; align-items: flex-start; justify-content: flex-start;
  overflow: auto; padding: 20px; position: relative;
}
#previewWrap {
  position: relative; display: inline-block;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5); border-radius: var(--radius-sm);
  line-height: 0; margin: 0 auto; min-width: 0; border: 1px solid var(--glass-border);
}
#previewImg { display: block; max-width: none; }
#loading {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6); z-index: 999; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  align-items: center; justify-content: center; font-size: 18px; color: var(--text-primary);
}
#loading.show { display: flex; }

/* Params bar styling */
#paramsBar label, #paramsBar select, #paramsBar input { font-family: var(--font-ui); }
#paramsBar label { color: var(--text-muted); font-size: 13px; white-space: nowrap; }
#paramsBar select, #paramsBar input[type=number] {
  padding: 5px 8px; font-size: 13px;
  background: rgba(255,255,255,0.08); border: none; color: var(--text-primary);
  border-radius: var(--radius-sm); cursor: pointer; outline: none; transition: var(--transition);
}
#paramsBar input[type=number]:focus, #paramsBar select:focus { box-shadow: 0 0 10px var(--accent-blue-glow); }
#paramsBar input[type=number] { width: 55px; }
#paramsBar select option { background: var(--bg-surface); color: var(--text-primary); }
.btn {
  padding: 6px 14px; font-size: 13px;
  background: rgba(255,255,255,0.08); border: none; color: var(--text-primary);
  border-radius: var(--radius-sm); cursor: pointer; font-family: var(--font-ui); transition: var(--transition);
}
.btn:hover { background: rgba(255,255,255,0.14); box-shadow: 0 0 12px rgba(255,255,255,0.08); transform: translateY(-1px); }
.btn-primary { background: rgba(74,124,247,0.15); color: var(--accent-blue); }
.btn-primary:hover { background: rgba(74,124,247,0.25); box-shadow: 0 0 14px var(--accent-blue-glow); }
.btn-success { background: rgba(52,211,153,0.12); color: var(--accent-green); border: none; }
.btn-success:hover { background: rgba(52,211,153,0.2); box-shadow: 0 0 14px rgba(52,211,153,0.2); }
textarea { border: none; }
#textInput:focus { box-shadow: 0 0 12px var(--accent-blue-glow); background: rgba(255,255,255,0.12); }
/* Variant thumbnails consistent left alignment */
.char-sel-item > div:last-child { display: flex; flex-wrap: wrap; gap: 2px; flex: 1; justify-content: flex-start; }
/* Zoom controls */
#zoomInfo {
  font-size: 11px; color: var(--text-faint); background: var(--glass-bg);
  padding: 2px 8px; border-radius: var(--radius-sm); border: 1px solid var(--glass-border);
  min-width: 44px; text-align: center;
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.15)}
body.light ::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12)}
body.light ::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,0.2)}
body.light .btn { background: rgba(0,0,0,0.06); }
body.light .btn:hover { background: rgba(0,0,0,0.1); }
body.light .btn-primary { background: rgba(59,111,224,0.1); }
body.light .btn-primary:hover { background: rgba(59,111,224,0.18); }
body.light .btn-success { background: rgba(52,211,153,0.1); }
body.light .btn-success:hover { background: rgba(52,211,153,0.18); }
</style>

<body>

<div id="tabBar">
  <a class="tab" onclick="location.replace('/')" style="cursor:pointer">字库浏览</a>
  <a class="tab active" onclick="location.replace('/compose')" style="cursor:pointer">集字排版</a>
  <span style="flex:1"></span>
  <button class="tab" id="themeBtn" onclick="toggleTheme()" title="切换浅色/深色模式" style="font-size:18px;line-height:1;padding:8px 12px;background:none;border:none;outline:none;cursor:pointer">🌙</button>
  <button class="tab" onclick="if(confirm('退出字符查看器？')){fetch('/shutdown',{method:'POST'});setTimeout(()=>window.close(),500)}" title="退出服务器" style="font-size:12px;padding:8px 12px;background:none;border:none;outline:none;cursor:pointer;color:var(--accent-red)">⏻ 退出</button>
</div>

<div id="main">
  <div id="sidebar">
    <div id="inputSection" style="padding:10px 12px; border-bottom:1px solid var(--glass-border);flex-shrink:0;">
      <label style="font-size:12px; color:var(--text-muted); display:block; margin-bottom:6px;">✍ 输入文字</label>
      <textarea id="textInput" placeholder="Shift+Enter 生成，Enter 换行..." rows="3" style="width:100%; padding:8px 10px; font-size:14px; background:rgba(255,255,255,0.08); color:var(--text-primary); border-radius:var(--radius-sm); outline:none; resize:vertical; font-family:var(--font-ui); line-height:1.5; min-height:60px; transition:var(--transition);">梦回红楼</textarea>
      <div style="margin-top:8px; display:flex; gap:6px;">
        <button class="btn btn-primary" onclick="doSearch()" style="flex:1;">生成</button>
      </div>
    </div>
    <h3>选字列表 <span id="selectedCharName" style="font-weight:normal;font-size:12px;color:var(--accent-gold);"></span></h3>
    <div id="charSelectList"><div style="padding:20px;text-align:center;color:var(--text-faint);font-size:14px;">输入文字后生成</div></div>
    </div>
    <div id="previewArea">
      <div id="previewWrap">
        <img id="previewImg" style="display:none; cursor:crosshair;">
        <div id="noPreview" style="padding:40px;color:var(--text-faint);text-align:center;">
          输入文字，设置参数，点击「生成」
        </div>
      </div>
    </div>
  </div>
</div>

<div id="loading" class="show" style="display:none;">渲染中...</div>

<div id="paramsBar" style="
  background:var(--glass-bg); padding:8px 20px; display:flex; align-items:center; gap:12px;
  border-top:1px solid var(--glass-border); flex-shrink:0; flex-wrap:wrap;
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
">
  <label id="colsLabel">列字数</label>
  <input type="number" id="colsInput" value="14" min="1" max="50">
  <label>方向</label>
  <select id="dirSelect">
    <option value="h_ltr">横排 LTR</option>
    <option value="h_rtl">横排 RTL</option>
    <option value="v_rtl" selected>竖排 RTL</option>
    <option value="v_ltr">竖排 LTR</option>
  </select>
  <label>字大小</label>
  <input type="number" id="charSizeInput" value="80" min="10" max="500">
  <label>间距</label>
  <input type="number" id="gapInput" value="8" min="0" max="100">
  <label>背景</label>
  <select id="bgSelect">
    <option value="beige" selected>米白色</option>
    <option value="white">白色</option>
    <option value="black">黑色</option>
    <option value="red">红色</option>
    <option value="grass">草木纸</option>
    <option value="gold_fleck">洒金宣</option>
  </select>
  <label>字色</label>
  <select id="colorSelect">
    <option value="black" selected>黑色</option>
    <option value="white">白色</option>
    <option value="ink_blue">墨蓝</option>
    <option value="gold">金色</option>
    <option value="red">红色</option>
  </select>
  <button class="btn btn-primary" onclick="doRender()">渲染</button>
  <button class="btn btn-success" onclick="exportPNG()">导出 PNG</button>
  <button class="btn btn-success" onclick="exportPDF()">导出 PDF</button>
  <span style="flex:1"></span>
  <label style="font-size:11px;color:var(--text-faint);">缩放</label>
  <input type="range" id="zoomSlider" min="0.1" max="5" step="0.01" value="1.0"
    style="width:100px; accent-color:var(--accent-blue); cursor:pointer;">
  <span id="zoomInfo" style="font-size:12px;color:var(--text-faint);min-width:44px;text-align:center;">100%</span>
</div>

<script>
// ---- State ----
var charData = [];
var layoutCells = [];
var currentText = '';
var previewWidth = 0;
var previewHeight = 0;
var ZOOM_BASE = 0.40; // 100% slider = 40% of natural size (chars ~40px)
var lastRenderBlob = null; // stores latest rendered PNG blob for export

// ---- Zoom state ----
var zoomLevel = 1.0;
var totalCols = 0;

// ---- Punctuation set (client-side) ----
var PUNCTUATION = new Set('，。、；：？！,.;:?!');

// ---- Layout cell computation (matches server's segment-based layout) ----
function computeLayoutCells(text) {
  var params = getRenderParams();
  var cols = params.cols || 14;
  var cells = [];
  var segCol = 0, segRow = 0;
  for (var ti = 0; ti < text.length; ti++) {
    var ch = text[ti];
    if (ch === '\n') {
      segCol++;
      segRow = 0;
    } else if (ch === ' ') {
      cells.push({ segCol: segCol, segRow: segRow, textIdx: ti, char: ch });
      segRow++;
    } else if (PUNCTUATION.has(ch)) {
      // Overlaid on previous cell in same column
    } else {
      if (segRow >= cols) {
        segCol++;
        segRow = 0;
      }
      cells.push({ segCol: segCol, segRow: segRow, textIdx: ti, char: ch });
      segRow++;
    }
  }
  return cells;
}

function getCellPos(segCol, segRow, cellSize, gap, cols, direction, totalCols) {
  var leftMargin = gap * 2;
  if (direction.startsWith('v')) {
    var colIdx = direction.indexOf('rtl') >= 0 ? (totalCols - 1 - segCol) : segCol;
    var rowIdx = segRow;
    return {
      x: leftMargin + colIdx * (cellSize + gap),
      y: gap + rowIdx * (cellSize + gap),
      w: cellSize, h: cellSize
    };
  } else {
    // horizontal: segRow % cols = column index, segCol = row (y)
    var colIdx = segRow % cols;
    if (direction.indexOf('rtl') >= 0) colIdx = cols - 1 - colIdx;
    var rowIdx = segCol;
    return {
      x: leftMargin + colIdx * (cellSize + gap),
      y: gap + rowIdx * (cellSize + gap),
      w: cellSize, h: cellSize
    };
  }
}

// ---- Search ----
function doSearch() {
  var textarea = document.getElementById('textInput');
  currentText = textarea.value;  // Keep newlines
  if (!currentText.trim()) return;
  
  // Build search string without newlines
  var searchText = currentText.replace(/\n/g, '').trim();
  if (!searchText) return;

  document.getElementById('loading').style.display = 'flex';
  fetch('/api/compose/search?text=' + encodeURIComponent(searchText))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      charData = (data.chars || []).map(function(c) { return { char: c.char, variants: c.variants, selectedIdx: c.variants.length > 0 ? 0 : -1 }; });
      layoutCells = computeLayoutCells(currentText);
      renderCharList();
      document.getElementById('loading').style.display = 'none';
      doRender();
    })
    .catch(function() { document.getElementById('loading').style.display = 'none'; });
}

function renderCharList(selectedTextIdx) {
  var list = document.getElementById('charSelectList');
  if (!charData || charData.length === 0) { list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-faint);">未找到</div>'; return; }
  var html = '';
  charData.forEach(function(cd, idx) {
    var ch = cd.char;
    var vcount = cd.variants.length;
    var selIdx = cd.selectedIdx;
    var textIdx = idx; // simplified: dataIdx matches text position
    var isHighlighted = (selectedTextIdx === idx);
    html += '<div class="char-sel-item' + (isHighlighted ? '" style="background:rgba(74,124,247,0.12);"' : '"') + '>';
    html += '<div><span class="char-text">' + ch + '</span> <span class="char-pos">(' + vcount + '个)</span></div>';
    html += '<div>';
    if (vcount > 0) {
      var show = cd.variants.slice(0, Math.min(5, vcount));
      show.forEach(function(v, vi) {
        var isActive = (vi === selIdx) ? ' active' : '';
        html += '<img class="var-thumb' + isActive + '" src="/api/image/' + v.page_dir + '/' + encodeURIComponent(v.filename) + '?mode=binary&invert=0&size=60" title="第' + v.page + '页" onclick="event.stopPropagation(); selectVariant(' + idx + ',' + vi + ')">';
      });
    } else {
      html += '<span style="color:var(--text-faint);">无</span>';
    }
    html += '</div></div>';
  });
  list.innerHTML = html;
}

function selectVariant(charIdx, varIdx) {
  if (!charData[charIdx]) return;
  charData[charIdx].selectedIdx = varIdx;
  renderCharList();
  doRender();
}

// ---- Render ----
function doRender() {
  var text = currentText;
  if (!text || !text.trim()) return;
  layoutCells = computeLayoutCells(text);

  // Build chars array from text, matching to charData
  var chars = [];
  var variants = {};
  var dataIdx = 0;
  for (var ti = 0; ti < text.length; ti++) {
    var tc = text[ti];
    chars.push(tc);
    if (dataIdx < charData.length && charData[dataIdx].char === tc) {
      var cd = charData[dataIdx];
      if (cd.selectedIdx >= 0 && cd.selectedIdx < cd.variants.length) {
        var v = cd.variants[cd.selectedIdx];
        variants[ti] = { page_dir: v.page_dir, filename: v.filename };
      }
      dataIdx++;
    } else {
      for (var j = 0; j < charData.length; j++) {
        if (charData[j].char === tc) {
          var cd2 = charData[j];
          if (cd2.selectedIdx >= 0 && cd2.selectedIdx < cd2.variants.length) {
            var v2 = cd2.variants[cd2.selectedIdx];
            variants[ti] = { page_dir: v2.page_dir, filename: v2.filename };
          }
          break;
        }
      }
    }
  }

  var params = getRenderParams();

  document.getElementById('loading').style.display = 'flex';
  fetch('/api/compose/render', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chars: chars, variants: variants, params: params }),
  })
  .then(function(r) {
    if (!r.ok) { throw new Error('Render failed'); }
    // Capture actual cell size from header (server's auto-computed value)
    var actualCellSize = parseInt(r.headers.get('X-Cell-Size')) || 80;
    totalCols = parseInt(r.headers.get('X-Total-Cols')) || 0;
    return r.blob().then(function(blob) { return { blob: blob, cellSize: actualCellSize }; });
  })
  .then(function(result) {
    var blob = result.blob;
    lastRenderBlob = blob;
    var url = URL.createObjectURL(blob);
    var img = document.getElementById('previewImg');
    img.src = url;
    img.style.display = 'block';
    img.setAttribute('data-cell-size', result.cellSize);
    img.onload = function() {
      previewWidth = img.naturalWidth;
      previewHeight = img.naturalHeight;
      URL.revokeObjectURL(url);
      // Preserve user's zoom level
      applyZoom(zoomLevel);
    };
    document.getElementById('noPreview').style.display = 'none';
    document.getElementById('loading').style.display = 'none';

    // Apply background texture overlay (for patterned papers only)
    var wrap = document.getElementById('previewWrap');
    var bgVal = document.getElementById('bgSelect').value;
    wrap.className = '';
    if (bgVal === 'grass' || bgVal === 'gold_fleck') {
      wrap.classList.add('bg-' + bgVal);
    }
  })
  .catch(function(err) {
    document.getElementById('loading').style.display = 'none';
    alert('渲染失败: ' + err.message);
  });
}

function getRenderParams() {
  return {
    cols: parseInt(document.getElementById('colsInput').value) || 5,
    direction: document.getElementById('dirSelect').value,
    char_size: parseInt(document.getElementById('charSizeInput').value) || 80,
    gap: parseInt(document.getElementById('gapInput').value) || 8,
    text_color: document.getElementById('colorSelect').value,
    bg_color: document.getElementById('bgSelect').value,
  };
}

// ---- Export ----
function buildExportPayload() {
  var text = currentText;
  if (!text || !text.trim()) return null;
  var chars = [];
  var variants = {};
  var dataIdx = 0;
  for (var ti = 0; ti < text.length; ti++) {
    var tc = text[ti];
    chars.push(tc);
    if (tc === '\n') continue;
    if (dataIdx < charData.length && charData[dataIdx].char === tc) {
      var cd = charData[dataIdx];
      if (cd.selectedIdx >= 0 && cd.selectedIdx < cd.variants.length) {
        var v = cd.variants[cd.selectedIdx];
        variants[ti] = { page_dir: v.page_dir, filename: v.filename };
      }
      dataIdx++;
    } else {
      for (var j = 0; j < charData.length; j++) {
        if (charData[j].char === tc) {
          var cd2 = charData[j];
          if (cd2.selectedIdx >= 0 && cd2.selectedIdx < cd2.variants.length) {
            var v2 = cd2.variants[cd2.selectedIdx];
            variants[ti] = { page_dir: v2.page_dir, filename: v2.filename };
          }
          break;
        }
      }
    }
  }
  return { chars: chars, variants: variants, params: getRenderParams() };
}

function exportPNG() {
  if (!lastRenderBlob) { alert('请先渲染'); return; }
  var url = URL.createObjectURL(lastRenderBlob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'composition.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
}

function exportPDF() {
  var payload = buildExportPayload();
  if (!payload) { alert('请先输入文字'); return; }
  document.getElementById('loading').style.display = 'flex';
  fetch('/api/compose/export_pdf', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  })
  .then(function(r) {
    if (!r.ok) throw new Error('PDF export failed');
    return r.blob();
  })
  .then(function(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'composition.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
    document.getElementById('loading').style.display = 'none';
  })
  .catch(function(err) {
    document.getElementById('loading').style.display = 'none';
    alert('导出失败: ' + err.message);
  });
}

// ---- Zoom ----
function applyZoom(val) {
  zoomLevel = val;
  var img = document.getElementById('previewImg');
  if (previewWidth > 0) {
    img.style.width = (previewWidth * ZOOM_BASE * val) + 'px';
    img.style.height = 'auto';
  }
  document.getElementById('zoomInfo').textContent = Math.round(val * 100) + '%';
  // Center scroll when zoomed in
  var area = document.getElementById('previewArea');
  if (area.scrollWidth > area.clientWidth) {
    area.scrollLeft = (area.scrollWidth - area.clientWidth) / 2;
  } else {
    area.scrollLeft = 0;
  }
}

document.getElementById('zoomSlider').addEventListener('input', function() {
  applyZoom(parseFloat(this.value));
});

// ---- Click to select char in sidebar ----
document.getElementById('previewImg').addEventListener('click', function(e) {
  if (!previewWidth || !previewHeight) return;
  var text = currentText;
  if (!text) return;

  var img = document.getElementById('previewImg');
  var rect = img.getBoundingClientRect();
  var visualScale = img.offsetWidth / previewWidth;
  var clickX = (e.clientX - rect.left) / visualScale;
  var clickY = (e.clientY - rect.top) / visualScale;

  var params = getRenderParams();
  var gap = params.gap || 12;
  // Use actual cell size from server (or fallback to char_size)
  var cellSize = parseInt(document.getElementById('previewImg').getAttribute('data-cell-size')) || params.char_size || 80;

  // Find which layout cell was clicked
  for (var i = 0; i < layoutCells.length; i++) {
    var cell = layoutCells[i];
    if (cell.char === ' ') continue;
    var effectiveCols = totalCols > 0 ? totalCols : Math.max(1, Math.ceil(layoutCells.length / (params.cols || 14)) + 5);
    var pos = getCellPos(cell.segCol, cell.segRow, cellSize, gap, params.cols || 14, params.direction || 'v_rtl', effectiveCols);
    if (clickX >= pos.x && clickX < pos.x + pos.w &&
        clickY >= pos.y && clickY < pos.y + pos.h) {
      // Map textIdx (with newlines) → dataIdx (no newlines)
      var ti = cell.textIdx;
      var dataIdx = 0;
      for (var k = 0; k < ti; k++) {
        if (text[k] !== '\n') dataIdx++;
      }
      var items = document.querySelectorAll('.char-sel-item');
      if (items[dataIdx]) {
        items[dataIdx].scrollIntoView({ block: 'nearest' });
      }
      renderCharList(dataIdx);
      document.getElementById('selectedCharName').textContent = '→ ' + text[ti];
      break;
    }
  }
});

// ---- Textarea events ----
document.getElementById('textInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = (this.scrollHeight) + 'px';
});

// Shift+Enter = generate, Enter = newline
document.getElementById('textInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.shiftKey) {
    e.preventDefault();
    doSearch();
  }
});

// Auto-render on param change — use input for number fields (spinner arrows, typing)
['colsInput', 'charSizeInput', 'gapInput'].forEach(function(id) {
  var el = document.getElementById(id);
  var timer = null;
  el.addEventListener('input', function() {
    if (charData.length === 0) return;
    if (timer) clearTimeout(timer);
    timer = setTimeout(function() { timer = null; doRender(); }, 200);
  });
});
// Update cols label based on direction
function updateColsLabel() {
  var dir = document.getElementById('dirSelect').value;
  document.getElementById('colsLabel').textContent = dir.startsWith('v') ? '列字数' : '行字数';
}

['dirSelect'].forEach(function(id) {
  document.getElementById(id).addEventListener('change', function() { updateColsLabel(); if (charData.length > 0) doRender(); });
});
['bgSelect', 'colorSelect'].forEach(function(id) {
  document.getElementById(id).addEventListener('change', function() { if (charData.length > 0) doRender(); });
});

// Init with default text
document.getElementById('zoomSlider').value = zoomLevel;
document.getElementById('zoomInfo').textContent = '100%';
updateColsLabel();
doSearch();

// ---- Theme Toggle ----
function toggleTheme() {
  var b = document.body;
  var isLight = b.classList.toggle('light');
  document.getElementById('themeBtn').textContent = isLight ? '☀️' : '🌙';
  try { localStorage.setItem('ink_theme', isLight ? 'light' : 'dark'); } catch(e) {}
}
(function(){ var t = 'dark'; try { t = localStorage.getItem('ink_theme') || 'dark'; } catch(e) {}
  if (t === 'light') { document.body.classList.add('light'); document.getElementById('themeBtn').textContent = '☀️'; }
})();
</script>
</body>
</html>
